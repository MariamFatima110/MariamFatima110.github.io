<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8">
<title>Random Story Generator</title>
</head>

<body>
<div>
  <label for="custom-name">Enter custom name:</label>
  <input id="custom-name" type="text" placeholder="">
</div>
<fieldset>
  <legend>Choose locale:</legend>
  <label for="us">US</label>
  <input id="us" type="radio" name="uk-us" value="us" checked>
  <label for="uk">UK</label
  ><input id="uk" type="radio" name="uk-us" value="uk">
</fieldset>
<div>
  <button class="generate">Generate random story</button>
</div>
<!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
<p class="story"></p>

<script>
// Complete variable definitions and random functions

const customName = document.getElementById("custom-name");
const generateBtn = document.querySelector(".generate");
const story = document.querySelector(".story");
const insertx = ["Willy the Goblin", "Big Daddy", "Father Christmas"];
const inserty = ["the soup kitchen", "Disneyland", "the White House"];
const insertz = ["spontaneously combusted", "melted into a puddle on the sidewalk", "turned into a slug and slithered away"];

function randomValueFromArray(array) {
  const random = Math.floor(Math.random() * array.length);
  return array[random];
}


// Partial return random string function

function returnRandomStoryString() {
    let storyText = "It was 94 Fahrenheit outside, so :insertx: went for a walk. When they got to :inserty:, they stared in horror for a few moments, then :insertz:. Bob saw the whole thing, but was not surprised — :insertx: weighs 300 pounds, and it was a hot day."

    const xItem = randomValueFromArray(insertx);
    const yItem = randomValueFromArray(inserty);
    const zItem = randomValueFromArray(insertz);

    storyText = storyText.replaceAll(":insertx:", xItem)
    storyText = storyText.replace(":inserty:", yItem);
    storyText = storyText.replace(":insertz:", zItem);

  return storyText;
}

// Event listener and partial generate function definition

generateBtn.addEventListener("click", generateStory);

function generateStory() {
    let newStory = returnRandomStoryString();

  if (customName.value !== "") {
    newStory = newStory.replace("Bob", customName.value);
  }



  if (document.getElementById("uk").checked) {
    const weight = Math.round(300 * 0.0714286) + " stone";
    const temperature = Math.round((94 - 32) * (5 / 9)) + " centigrade";
    newStory = newStory.replace("300 pounds", weight);
    newStory = newStory.replace("94 Fahrenheit", temperature);
  }

  // TODO: replace "" with the correct expression
  story.textContent = newStory;
  story.style.visibility = "visible";
}
</script>

</body>
</html>
